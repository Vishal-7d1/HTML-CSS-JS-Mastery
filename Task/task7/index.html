<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Static Sky Showcase</title>
  <!-- CSS File Link -->
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
        <div class="left">       
            <div class="top-card">
            <img src="photos/1.jpg" alt="photo">
            </div>
            <div class="bottom-card">
            <img src="photos/2.jpg" alt="photo">
            </div>
            <div class="main-card">
            <img src="photos/3.jpg" alt="photo">
            </div>
            <div class="bottom-card">
            <img src="photos/4.avif" alt="photo">
            </div>
        </div>
    
        </div>
        <div class="right">

            <div class="arrow">
                <div >↑</div>
                <div >↓</div>
            </div>
            
            <div class="dots">
                <span ></span>
                <span ></span>
                <span ></span>
                <span class="active"></span>
                <span ></span>
                
            </div>
        </div>
        

  </div>

</html>
