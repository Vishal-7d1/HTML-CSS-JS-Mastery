<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Canva Clone</title>

    <link rel="stylesheet" href="style.css">

    <link rel="stylesheet"href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
</head>
<body>

        <nav>
            <div class="left">

                <a href="">File</a>
                <a href="">Resize</a>

                <div class="down">
                    <i class="fa-solid fa-pen"></i>
                    Editing
                    <i class="fa-solid fa-angle-down"></i>
                </div>

                <i class="fa-solid fa-rotate-left icon"></i>
                <i class="fa-solid fa-rotate-right icon"></i>

                <i class="fa-solid fa-cloud-arrow-up icon" ></i>

            </div>

            <div class="center">

                <span class="sample">Sample</span>

                <button class="btn">
                    👑 Start your trial for ₹0
                </button>

                <div class="small-icon profile">
                    <img src="photos/image.png" alt="">
                </div>

                <div class="small">
                    <i class="fa-solid fa-chart-simple"></i>
                </div>

                <div class="small">
                    <i class="fa-regular fa-comment"></i>
                </div>

                <button class="present">
                    Present
                    <i class="fa-solid fa-angle-down"></i>
                </button>

                <button class="share">
                    Share
                </button>

            </div>

        </nav>
        <div class="main_container">
         <div class="sidebar">
            <div class="item active">
                <i class="fa-solid fa-table-columns"></i>
                <span>Templates</span>
            </div>
            <div class="item">
                <i class="fa-solid fa-shapes"></i>
                <span>Elements</span>
            </div>
            <div class="item">
                <i class="fa-solid fa-t"></i>
                <span>Text</span>
            </div>
            <div class="item">
                <i class="fa-solid fa-camera"></i>
                <span>Brand</span>
            </div>
            <div class="item">
                <i class="fa-solid fa-cloud-arrow-up"></i>
                <span>Uploads</span>
            </div>
            <div class="item">
                <i class="fa-solid fa-pen-ruler"></i>
                <span>Tools</span>
            </div>
            <div class="item">
                <i class="fa-regular fa-folder"></i>
                <span>Projects</span>
            </div>
            <div class="item">
                <i class="fa-solid fa-table-cells-large"></i>
                <span>Apps</span>
            </div>                                                                                                         
            <div class="item">
                <i class="fa-regular fa-image"></i>
                <span>Magic Media</span>
            </div>
            <div class="item">
                <i class="fa-solid fa-music"></i>
                <span>Audio</span>
            </div>
            <div class="item">
                <i class="fa-regular fa-circle"></i>
                <span>Videoforme</span>
            </div>
        </div>
        
        <section class="search-panel bg-white p-3">
            <input
                type="text"
                class="form-control mb-3"
                placeholder="Describe your ideal design">
            <div class="row g-2 mb-4">
                <div class="col-6">
                    <button class="btn btn-outline-secondary w-100">
                        Generate
                    </button>
                </div>
                <div class="col-6">
                    <button class="btn btn-primary w-100">
                        Search
                    </button>
                </div>
            </div>
            <h5 class="mb-3">Recently Used</h5>
            <div class="row g-2">
                <div class="col-6">
                    <div class="template-card"></div>
                    <img src="photos/3.jpg" alt="Template 1" class="template-card">
                </div>
                <div class="col-6">
                    <div class="template-card"></div>
                    <img src="photos/1.jpg" alt="Template 2" class="template-card">
                </div>
            </div> 
            <h5 class="mt-4 mb-3">All Results</h5>
        </section>



        <div class="workspace d-flex justify-content-center align-item-center">
            <div class="canvas">
               <div class="row text-center g-5">
                        <div class="col-md-3">
                            <div class="shape circle"></div>
                        </div>

                        <div class="col-md-3">
                            <div class="shape square"></div>
                        </div>

                    
                        <div class="col-md-3">
                            <div class="triangle"></div>
                        </div>

                        
                        <div class="col-md-3">
                            <div class="shape pentagon"></div>
                        </div>

                        
                        <div class="col-md-3">
                            <div class="plus"></div>
                        </div>

                        
                        <div class="col-md-3">
                            <div class="shape parallelogram"></div>
                        </div>

                        
                        <div class="col-md-3">
                            <div class="arrow-up"></div>
                        </div>

                        
                        <div class="col-md-3">
                            <div class="heart"></div>
                        </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
