<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1> Create HTML Elements</h1>
    
    <img src="photos/image.png" alt="image" width="300" height="200">
    <audio controls>
        <source src="audio/audio.mp3" type="audio/mpeg">
    </audio>
    <video width="320" height="240" controls>
        <source src="video/video.mp4" type="video/mp4">
    </video>
    <iframe width="420" height="345" src="https://www.youtube.com/embed/tgbNymZ7vqY">
</iframe>
    <embed src="https://leetcode.com/problems/search-a-2d-matrix-ii/description/" width="560" height="315" type="video/mp4">
    <object data="https://leetcode.com/problems/search-a-2d-matrix-ii/description/" width="560" height="315"></object>
    <svg width="100" height="100">
        <circle cx="50" cy="50" r="40" stroke="green" stroke-width="4" fill="yellow" /> 
    </svg>
    <canvas id="myCanvas" width="200" height="100" style="border:1px solid #000000;">
        Your browser does not support the HTML canvas tag.  
    </canvas>

</body>
</html>
