<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Static Sky Showcase</title>
  <!-- CSS File Link -->
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="page-container">
    
    <!-- Left Section: 3D Stacked Cards (Static) -->
    <div class="carousel-view">
      <div class="card-deck">
        
        <!-- Sabse piche ka card (Sabse chota) -->
        <div class="sky-card pos-3">
          <img src="https://unsplash.com" alt="Stormy Sky">
        </div>

        <!-- Beech ka card -->
        <div class="sky-card pos-2">
          <img src="https://unsplash.com" alt="Dawn Sky">
        </div>

        <!-- Active card ke theek piche wala card -->
        <div class="sky-card pos-1">
          <img src="https://unsplash.com" alt="Nebula Sky">
        </div>

        <!-- Sabse aage wala Active Card (Color + Red Glow) -->
        <div class="sky-card pos-0">
          <img src="https://unsplash.com" alt="Crimson Sunset">
        </div>

      </div>
    </div>

    <!-- Right Section: Details Panel -->
    <div class="details-panel">
      <!-- Navigation Buttons (Static Arrow Icons) -->
      <div class="nav-controls">
        <div class="btn-nav">↑</div>
        <div class="btn-nav">↓</div>
      </div>

      <!-- Text Information -->
      <div class="info-display">
        <div class="display-name">Crimson Sunset</div>
        <div class="display-role">Vibrant Horizon Dusk</div>
      </div>

      <!-- Pagination Dots (Selected dot active hai) -->
      <div class="pagination-dots">
        <span class="dot"></span>
        <span class="dot"></span>
        <span class="dot"></span>
        <span class="dot active"></span>
        <span class="dot"></span>
        <span class="dot"></span>
      </div>
    </div>

  </div>

</body>
</html>
