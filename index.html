<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Canva Clone</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Top Navbar -->
    <header class="navbar">
        <div class="left-nav">
            <span>File</span>
            <span>Resize</span>
            <span>Editing</span>
        </div>

        <div class="center-nav">
            <button>Start your trial for ₹0</button>
        </div>

        <div class="right-nav">
            <button>Present</button>
            <button class="share">Share</button>
        </div>
    </header>

    <div class="container">

        <!-- Sidebar -->
        <aside class="sidebar">
            <ul>
                <li>Templates</li>
                <li>Elements</li>
                <li>Text</li>
                <li>Brand</li>
                <li>Uploads</li>
                <li>Tools</li>
                <li>Projects</li>
                <li>Apps</li>
            </ul>
        </aside>

        <!-- Left Panel -->
        <section class="panel">
            <input type="text" placeholder="Describe your ideal design">

            <div class="buttons">
                <button>Generate</button>
                <button class="search-btn">Search</button>
            </div>

            <h3>Recently Used</h3>

            <div class="templates">
                <div class="template"></div>
                <div class="template"></div>
                <div class="template"></div>
                <div class="template"></div>
                <div class="template"></div>
                <div class="template"></div>
            </div>
        </section>

        <!-- Main Canvas -->
        <main class="workspace">

            <div class="toolbar">
                
                <span class="tool-text">Edit</span>

                <div class="color-circle"></div>

                <div class="menu-icon">
                    <span></span>
                    <span></span>
                    <span></span>
                </div>

                <div class="curve-icon"></div>

                <div class="checkerboard"></div>

                <span class="tool-text">Effects</span>

                <span class="tool-text">Animate</span>

                <span class="tool-text">Position</span>

                <div class="divider"></div>

                <div class="roller-icon"></div>

            </div>
            <div class="canvas">

                <div class="shape circle"></div>
                <div class="shape square"></div>
                <div class="shape triangle"></div>
                <div class="shape pentagon"></div>

                <div class="shape plus"></div>
                <div class="shape parallelogram"></div>
                <div class="shape arrow"></div>
                <div class="shape heart"></div>

            </div>

            <div class="bottom-bar">
                <span>Notes</span>
                <span>Timer</span>

                <div class="zoom">
                    <input type="range">
                    <span>53%</span>
                </div>
            </div>

        </main>

    </div>

</body>
</html>
